version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: ivondebt_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - app_net
    # MongoDB is NOT exposed to the host — internal only

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ivondebt_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - MONGO_URI=mongodb://mongo:27017/debt_tracker
      - NODE_ENV=production
    depends_on:
      - mongo
    networks:
      - app_net

volumes:
  mongo_data:

networks:
  app_net:
    driver: bridge
